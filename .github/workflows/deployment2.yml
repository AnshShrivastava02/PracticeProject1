name: deployment 2
on: push
jobs:
  Lint:
    runs-on: macos-latest
    steps:
      - name: Get code
        uses: actions/checkout@v7.0.0
      - name: install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
  Test:
    needs: Lint
    runs-on: macos-latest
    steps:
      - name: Get code
        uses: actions/checkout@v7.0.0
      - name: install dependencies
        run: npm ci
      - name: test
        run: npm test
  Build:
    needs: Test
    runs-on: macos-latest
    steps:
      - name: Get code
        uses: actions/checkout@v7.0.0
      - name: install dependencies
        run: npm ci
      - name: Build Project
        run: npm run build
  Deploy:
    needs: Build
    runs-on: macos-latest
    steps:
      - name: Get code
        uses: actions/checkout@v7.0.0
      - name: install dependencies
        run: npm ci
      - name: Deploy
        run: echo "Deploying the project..."